[build]
  base = "frontend"
  publish = "frontend/dist"
  command = "npm run build"

[build.environment]
  VITE_API_URL = "https://blogspace-fxgv.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "https://blogspace-fxgv.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
