<svg width="512" height="640" viewBox="0 0 512 640" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    
    <!-- Main Purple Gradient -->
    <linearGradient id="bgGradient" x1="80" y1="40" x2="430" y2="520">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#4F2DDA"/>
      <stop offset="100%" stop-color="#12092E"/>
    </linearGradient>

    <!-- White Glow Gradient -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D8CCFF"/>
    </radialGradient>

    <!-- Dark Purple -->
    <linearGradient id="darkPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24104F"/>
      <stop offset="100%" stop-color="#080014"/>
    </linearGradient>

    <!-- Outer Glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Rounded Background -->
  <rect x="70" y="40" width="372" height="372" rx="90"
        fill="url(#bgGradient)"
        filter="url(#outerGlow)"/>

  <!-- Decorative Curves -->
  <path d="M70 160C70 90 140 60 220 60C170 100 150 130 70 160Z"
        fill="url(#darkPurple)"/>

  <path d="M442 150C420 80 360 50 280 60C350 100 380 140 442 150Z"
        fill="url(#darkPurple)"/>

  <path d="M90 330C120 250 200 250 250 310C190 330 160 380 90 330Z"
        fill="url(#darkPurple)"/>

  <path d="M442 300C390 260 340 260 290 310C360 330 390 360 442 300Z"
        fill="url(#darkPurple)"/>

  <!-- Main B Shape -->
  <path d="M205 130H265C320 130 350 155 350 205C350 240 330 265 295 275
           C340 285 365 315 365 360C365 415 320 445 250 445H205V130Z"
        fill="url(#glowGradient)"
        filter="url(#outerGlow)"/>

  <!-- Inner Pen Nib -->
  <path d="M256 200
           L295 250
           L256 360
           L217 250
           Z"
        fill="#12092E"/>

  <!-- Pen Dot -->
  <circle cx="256" cy="185" r="10" fill="#4F2DDA"/>

  <!-- Center Circle -->
  <circle cx="256" cy="270" r="14" fill="url(#glowGradient)"/>

  <!-- BlogSpace Text -->
  <text x="256"
        y="560"
        text-anchor="middle"
        font-size="62"
        font-family="Poppins, Arial, sans-serif"
        font-weight="700"
        fill="#1C2359">
    Blog<tspan fill="#FFFFFF">Space</tspan>
  </text>

</svg>